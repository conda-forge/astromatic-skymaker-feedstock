{% set name = "skymaker" %}
{% set version = "3.10.5" %}

package:
  name: astromatic-{{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/astromatic/{{ name }}/archive/refs/tags/{{ version }}.tar.gz
  sha256: 0521bcf3fad4b362870ef06ca39b96fd85b6a1e5235192db551a4406df8a46c2

build:
  skip: true  # [win]
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - make
  host:
    - fftw
  run:
    - fftw

test:
  commands:
    - test -f ${CONDA_PREFIX}/bin/sky
    - sky -d


about:
  home: https://www.astromatic.net/software/skymaker
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE
  summary: 'SkyMaker is a program that simulates astronomical images'

  description: |
    SkyMaker is a program that simulates astronomical images. It accepts
    object lists in ASCII generated by the Stuff program to produce realistic
    astronomical fields. SkyMaker is part of the EFIGI development project.

extra:
  recipe-maintainers:
    - drbixx
    - teake
